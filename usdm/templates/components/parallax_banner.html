{% load content_tags %}
<section class="hero hero--parallax {{ modifier }}" data-parallax data-parallax-velocity="0.3">
  <div class="hero__inner content-shell">
    {% if is_page_title %}<h1 class="hero__title">{{ title }}</h1>{% else %}<h2 class="hero__title">{{ title }}</h2>{% endif %}
    <p class="hero__subtitle">{{ subtitle|banner_lines }}{% if subtitle_second %}<br>{{ subtitle_second }}{% endif %}</p>
  </div>
</section>
<div class="section-transition" aria-hidden="true"></div>
