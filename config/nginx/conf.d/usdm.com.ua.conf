# HTTP remains available solely for the ACME HTTP-01 challenge.  All site
# traffic is sent to the canonical HTTPS hostname after a certificate exists.
server {
    listen 80;
    listen [::]:80;
    server_name usdm.com.ua www.usdm.com.ua;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://usdm.com.ua$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name usdm.com.ua;

    ssl_certificate /etc/letsencrypt/live/usdm.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/usdm.com.ua/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    include /etc/nginx/includes/contact_rate_guard.conf;

    location ^~ /static/ { alias /srv/files/usdm/static/; }
    location ^~ /media/ { alias /srv/files/usdm/media/; }
    location / {
        proxy_pass http://usdm-prod:8000;
        include /etc/nginx/includes/proxy_common.conf;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.usdm.com.ua;

    ssl_certificate /etc/letsencrypt/live/usdm.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/usdm.com.ua/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://usdm.com.ua$request_uri;
}
