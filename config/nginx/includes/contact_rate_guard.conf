location = /_contact_rate_guard {
    internal;
    proxy_pass http://contact-rate-guard:8080/check;
    proxy_method POST;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-Method $request_method;
    proxy_set_header X-Original-Path $request_uri;
    proxy_set_header X-Guard-Layer nginx;
    proxy_set_header X-Guard-Site $host;
    # Compatibility headers let either side of a rolling update stay protected.
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Rate-Layer nginx;
    proxy_set_header X-Rate-Site $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_intercept_errors on;
    error_page 500 502 503 504 = @contact_rate_guard_unavailable;
}

location @contact_rate_guard_unavailable {
    return 204;
}

location @contact_rate_limited {
    default_type application/json;
    add_header Retry-After $contact_rate_retry_after always;
    return 429 '{"detail":"Too many contact form requests. Please try again later."}';
}
