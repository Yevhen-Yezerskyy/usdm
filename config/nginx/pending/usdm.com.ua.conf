# Activate only after usdm.com.ua DNS points to this server and its certificate exists.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name usdm.com.ua www.usdm.com.ua;

    ssl_certificate /etc/letsencrypt/live/usdm.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/usdm.com.ua/privkey.pem;

    include /etc/nginx/includes/contact_rate_guard.conf;

    location ^~ /static/ { alias /srv/files/usdm/static/; }
    location ^~ /media/ { alias /srv/files/usdm/media/; }
    location / {
        proxy_pass http://usdm-prod:8000;
        include /etc/nginx/includes/proxy_common.conf;
    }
}
